<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CEMATRIX OFFICIAL MALAYSIA</title>
    <link rel="stylesheet" href="css\header.css">
    <link rel="stylesheet" href="css\login.css">
</head>

<body>
    <div class="header">
        <form action="search-form" method="post">
            <input type="search" class="searchbar" id="searchbar" maxlength="50" placeholder="  Search">
            <img  src="static\logo\icon\searchicon.png" class="searchicon">
        </form>
        <img src="static\logo\cematrix.png" class="cematrixlogo">
        <img src="static\logo\icon\my-wish-list.png" class="mywishlist">
        <img src="static\logo\icon\shopping-cart-icon-on-transparent-background-free-png.png" class="shoppingcart">

        <div class="dropdown">
            <img src="static\logo\icon\user-3296_1024.png" class="usericon" id= "userbtn">
            <div class="usermenu" id="usermenu">
                <div class="menu-item">
                    <div class="plus-circle">+</div>
                    <div class="addaccount">Add Account</div>
                </div>
            </div>
        </div>
    </div>
    <hr class="header-hr">

    <div class="login">
        <div id="loginwd">Login</div>
        <div><input type="name" maxlength="50" minlength="10" class="usernamebar" placeholder="Enter your Username here!"></div>
        <div><input type="password" maxlength="12" minlength="8" class="passwordbar" placeholder="Password"></div>
        <div><button id="loginbtn">Login</button></div>
    </div>
    <script src="script.js"></script>
</body>
<footer>
    
</footer>

</html>
