<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CEMATRIX OFFICIAL MALAYSIA</title>
    <link rel="stylesheet" href="css\header.css">
    <link rel="stylesheet" href="css\table.css">
    
</head>

<body>
    <div class="header">
        <form action="search-form" method="post">
            <input type="search" class="searchbar" id="searchbar" maxlength="50" placeholder="  Search Product">
            <img  src="static\logo\icon\searchicon.png" class="searchicon">
        </form>
        <img src="static\logo\cematrix.png" class="cematrixlogo">
        <img src="static\logo\icon\my-wish-list.png" class="mywishlist">
        <img src="static\logo\icon\shopping-cart-icon-on-transparent-background-free-png.png" class="shoppingcart">

        <div class="dropdown">
            <img src="static\logo\icon\user-3296_1024.png" class="usericon" id= "userbtn">
            <div class="usermenu" id="usermenu">
                <div class="menu-item">
                    <div class="plus-circle">+</div>
                    <div class="addaccount">Add Account</div>
                </div>
            </div>
        </div>
    </div>
    <hr class="header-hr">

    <div class="pdt_main">
        <div id="pdtwd">Product Maintaince</div>
        <div class="container">
            <table id="pdtable">
                <tr>
                    <th>ID</th>
                    <th>Photo</th>
                    <th>Product Name</th>
                    <th>Category</th>
                    <th>Price (RM)</th>
                    <th>Stock</th>
                    <th>Action</th>
                </tr>
            </table>
            <div class="productadd">
                <input type="name" maxlength="100" placeholder="Product Name" id="pdtnme">
                <input type="number" min="0" maxlength="7" placeholder="Price(RM)" id="pdtpc">
                <button onclick="addData()" id="pdtadd">Add</button>
            </div>
        </div>
    </div>
    <div id="deleterow" class="row">
            <div class="row_container">
                <div id="dltwd">Are you sure you want to delete this product?</div>
                <div class="dtlbtn">
                    <button id="yesdelete">Delete</button>
                    <button id="canceldelete">Cancel</button>
                </div>
            </div>
        </div>
    <script src="script.js"></script>
</body>
<footer>

</footer>

</html>
